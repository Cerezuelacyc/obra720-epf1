<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;background:#0a0e14;color:#e2e8f0;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0e14}::-webkit-scrollbar-thumb{background:#00ff9d33;border-radius:2px}
input,textarea{background:#111820;border:1px solid #1e3a2a;color:#e2e8f0;padding:10px 14px;border-radius:4px;font-family:'Courier New',monospace;font-size:14px;transition:all 0.2s;outline:none;width:100%}
input:focus,textarea:focus{border-color:#00ff9d;box-shadow:0 0 0 2px #00ff9d22}
.btn{padding:10px 24px;border:none;border-radius:4px;cursor:pointer;font-weight:700;font-size:13px;letter-spacing:1px;transition:all 0.2s;text-transform:uppercase;font-family:'Courier New',monospace}
.btn-primary{background:#00ff9d;color:#0a0e14}.btn-primary:hover{background:#00e88d;transform:translateY(-1px);box-shadow:0 4px 20px #00ff9d44}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-secondary{background:transparent;color:#00ff9d;border:1px solid #00ff9d44}.btn-secondary:hover{border-color:#00ff9d;background:#00ff9d11}
.btn-danger{background:transparent;color:#ff4444;border:1px solid #ff444444}.btn-danger:hover{border-color:#ff4444;background:#ff444411}
.card{background:#111820;border:1px solid #1e2d3d;border-radius:8px;padding:24px}
.tag-badge{display:inline-block;padding:4px 12px;border-radius:3px;font-size:12px;letter-spacing:1px}
.check-box{width:22px;height:22px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fade-in{animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.scan-line{position:relative;overflow:hidden}
.scan-line::after{content:'';position:absolute;top:-100%;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#00ff9d44,transparent);animation:scan 3s linear infinite}
@keyframes scan{to{top:200%}}
.chat-bubble{max-width:85%;padding:12px 16px;border-radius:8px;font-size:13px;line-height:1.7;white-space:pre-wrap}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;border-bottom:1px solid #1e3a2a;color:#00ff9d;font-weight:700;letter-spacing:1px;font-size:11px;text-transform:uppercase}
td{padding:10px 12px;border-bottom:1px solid #1a2535;vertical-align:middle}
tr:hover td{background:#0d1520}
.img-btn{background:#111820;border:1px solid #1e3a2a;color:#4a7a6a;border-radius:4px;padding:10px 14px;cursor:pointer;font-size:18px;transition:all 0.2s}
.img-btn:hover{border-color:#00ff9d;color:#00ff9d}
.checkbox-row{display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 0}
.checkbox-row input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#00ff9d}
</style>
</head>
<body>
<div id="root"></div>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyCYola7PhP1aGVzt_DOIMysvJltImoROaw",

<script type="text/babel">
const { useState, useRef, useEffect } = React;
const STATUS = { idle:"idle", found:"found", notfound:"notfound", adding:"adding", success:"success" };

function getCol(room) { return db.collection("rooms").doc(room).collection("tags"); }

function ImportWizard({ tags, db: dbProp, onFinish, onCancel }) {
  const [idx, setIdx] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [calidad, setCalidad] = useState(null);
  const [precom, setPrecom] = useState(null);
  const [responsable, setResponsable] = useState("");
  const [fecha, setFecha] = useState(new Date().toISOString().split("T")[0]);
  const [step, setStep] = useState("calidad");
  const current = tags[idx], total = tags.length;
  const alreadyExists = dbProp.find(r => r.tag === current);

  function next(ans) {
    const a = [...answers, ans];
    if (idx + 1 >= total) { onFinish(a); return; }
    setAnswers(a); setIdx(idx+1); setCalidad(null); setPrecom(null);
    setResponsable(""); setFecha(new Date().toISOString().split("T")[0]); setStep("calidad");
  }
  function skip() {
    if (idx + 1 >= total) { onFinish(answers); return; }
    setIdx(idx+1); setCalidad(null); setPrecom(null);
    setResponsable(""); setFecha(new Date().toISOString().split("T")[0]); setStep("calidad");
  }

  return (
    <div className="fade-in" style={{background:"#0d1520",border:"1px solid #7dd3fc44",borderRadius:10,padding:24,marginTop:12}}>
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span style={{fontSize:11,color:"#4a7a6a",letterSpacing:1}}>CARGANDO TAGs DESDE IMAGEN</span>
          <span style={{fontSize:11,color:"#7dd3fc"}}>{idx+1} / {total}</span>
        </div>
        <div style={{height:3,background:"#1e2d3d",borderRadius:2}}>
          <div style={{width:`${(idx/total)*100}%`,height:"100%",background:"#7dd3fc",borderRadius:2,transition:"width 0.4s"}}/>
        </div>
      </div>
      <div style={{marginBottom:18,display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:22,color:"#00ff9d",letterSpacing:3}}>{current}</span>
        {alreadyExists && <span style={{fontSize:11,color:"#fbbf24",background:"#fbbf2422",border:"1px solid #fbbf2444",borderRadius:3,padding:"3px 10px"}}>YA EXISTE</span>}
      </div>
      {alreadyExists ? (
        <div>
          <p style={{fontSize:13,color:"#a0aec0",marginBottom:14}}>Este TAG ya existe. ¿Saltarlo?</p>
          <div style={{display:"flex",gap:10}}>
            <button onClick={skip} className="btn btn-secondary">SALTEAR</button>
            <button onClick={()=>setStep("calidad")} className="btn btn-danger">SOBREESCRIBIR</button>
          </div>
        </div>
      ) : <>
        {step==="calidad" && <div className="fade-in">
          <p style={{fontSize:14,color:"#e2e8f0",marginBottom:16}}>¿La <strong style={{color:"#7dd3fc"}}>Planilla de Calidad</strong> está hecha?</p>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{setCalidad(true);setStep("precom");}} className="btn btn-primary">✓ SÍ</button>
            <button onClick={()=>{setCalidad(false);setStep("precom");}} className="btn btn-danger">✗ NO</button>
            <button onClick={skip} className="btn btn-secondary" style={{marginLeft:"auto",fontSize:11}}>SALTEAR</button>
          </div>
        </div>}
        {step==="precom" && <div className="fade-in">
          <div style={{marginBottom:12}}><span style={{fontSize:12,color:"#4a6a5a"}}>Calidad: </span><span style={{color:calidad?"#00ff9d":"#ff4444"}}>{calidad?"✓":"✗"}</span></div>
          <p style={{fontSize:14,color:"#e2e8f0",marginBottom:16}}>¿La <strong style={{color:"#7dd3fc"}}>Planilla de Precomisionado</strong> está hecha?</p>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{setPrecom(true);setStep("meta");}} className="btn btn-primary">✓ SÍ</button>
            <button onClick={()=>{setPrecom(false);setStep("meta");}} className="btn btn-danger">✗ NO</button>
          </div>
        </div>}
        {step==="meta" && <div className="fade-in" style={{display:"grid",gap:12}}>
          <div style={{display:"flex",gap:16,fontSize:12,color:"#4a6a5a"}}>
            <span>Calidad: <span style={{color:calidad?"#00ff9d":"#ff4444"}}>{calidad?"✓":"✗"}</span></span>
            <span>Precomisionado: <span style={{color:precom?"#00ff9d":"#ff4444"}}>{precom?"✓":"✗"}</span></span>
          </div>
          <div><label style={{fontSize:11,color:"#4a7a6a",display:"block",marginBottom:5}}>RESPONSABLE</label><input value={responsable} onChange={e=>setResponsable(e.target.value)} placeholder="Ing. Apellido"/></div>
          <div><label style={{fontSize:11,color:"#4a7a6a",display:"block",marginBottom:5}}>FECHA</label><input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/></div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>next({tag:current,calidad,precom,responsable,fecha})} className="btn btn-primary" style={{flex:1}}>{idx+1>=total?"FINALIZAR":"SIGUIENTE →"}</button>
            <button onClick={skip} className="btn btn-secondary" style={{fontSize:11}}>SALTEAR</button>
          </div>
        </div>}
      </>}
      <button onClick={onCancel} style={{marginTop:16,background:"none",border:"none",color:"#4a5568",fontSize:11,cursor:"pointer"}}>✕ CANCELAR</button>
    </div>
  );
}

function LoginScreen({ onEnter }) {
  const [code, setCode] = useState("");
  const [error, setError] = useState("");
  function handle() {
    const c = code.trim().toUpperCase().replace(/\s+/g,"-");
    if (c.length < 3) { setError("Mínimo 3 caracteres."); return; }
    onEnter(c);
  }
  return (
    <div style={{minHeight:"100vh",background:"#0a0e14",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:400,padding:24}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div className="pulse" style={{width:12,height:12,borderRadius:"50%",background:"#00ff9d",boxShadow:"0 0 16px #00ff9d",margin:"0 auto 20px"}}/>
          <h1 style={{fontSize:28,fontWeight:700,color:"#00ff9d",letterSpacing:4,marginBottom:8}}>TAG TRACKER</h1>
          <p style={{fontSize:12,color:"#4a6a5a",letterSpacing:2}}>SISTEMA DE GESTIÓN TÉCNICA v3.0</p>
        </div>
        <div className="card">
          <p style={{fontSize:13,color:"#a0aec0",marginBottom:24,textAlign:"center",lineHeight:1.6}}>
            Ingresá el <span style={{color:"#00ff9d"}}>código de obra</span> para acceder a la base de datos compartida en tiempo real.
          </p>
          <label style={{fontSize:11,color:"#4a7a6a",display:"block",marginBottom:8,letterSpacing:1}}>CÓDIGO DE OBRA</label>
          <input value={code} onChange={e=>{setCode(e.target.value.toUpperCase());setError("");}}
            onKeyDown={e=>e.key==="Enter"&&handle()} placeholder="Ej: OBRA-2025"
            style={{fontSize:18,letterSpacing:3,textAlign:"center",marginBottom:8}}/>
          {error && <p style={{fontSize:12,color:"#ff4444",marginBottom:8}}>{error}</p>}
          <button onClick={handle} className="btn btn-primary" style={{width:"100%",marginTop:8,fontSize:14,padding:12}}>INGRESAR →</button>
        </div>
        <p style={{textAlign:"center",fontSize:11,color:"#2d3748",marginTop:16}}>
          Todos los que usen el mismo código comparten la misma base de datos en tiempo real.
        </p>
      </div>
    </div>
  );
}

function App() {
  const [roomCode, setRoomCode] = useState(null);
  const [records, setRecords] = useState([]);
  const [loading, setLoading] = useState(false);
  const [tab, setTab] = useState("consulta");
  const [query, setQuery] = useState("");
  const [status, setStatus] = useState(STATUS.idle);
  const [currentRecord, setCurrentRecord] = useState(null);
  const [form, setForm] = useState({fecha:"",responsable:"",estado_calidad:false,estado_precomisionado:false,link:"",notas:""});
  const [precomForm, setPrecomForm] = useState({fecha:"",responsable:"",notas:""});
  const [precomMode, setPrecomMode] = useState(false);
  const [formError, setFormError] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [chatMessages, setChatMessages] = useState([{role:"assistant",text:"Hola. Soy tu asistente técnico de TAGs. Consultá el estado de cualquier registro o importá TAGs desde una imagen 📷."}]);
  const [chatInput, setChatInput] = useState("");
  const [chatLoading, setChatLoading] = useState(false);
  const [imageData, setImageData] = useState(null);
  const [imagePreview, setImagePreview] = useState(null);
  const [wizardTags, setWizardTags] = useState(null);
  const [chatPrecomTag, setChatPrecomTag] = useState(null);
  const [chatPrecomForm, setChatPrecomForm] = useState({fecha:"",responsable:""});
  const chatEndRef = useRef(null);
  const fileRef = useRef(null);

  // Suscripción Firestore en tiempo real
  useEffect(() => {
    if (!roomCode) return;
    setLoading(true);
    const unsub = getCol(roomCode).orderBy("tag").onSnapshot(snap => {
      setRecords(snap.docs.map(d => ({id:d.id,...d.data()})));
      setLoading(false);
    });
    return () => unsub();
  }, [roomCode]);

  useEffect(() => { chatEndRef.current?.scrollIntoView({behavior:"smooth"}); }, [chatMessages]);

  useEffect(() => {
    if (currentRecord) {
      const u = records.find(r => r.tag === currentRecord.tag);
      if (u) setCurrentRecord(u);
    }
  }, [records]);

  async function saveRecord(rec) { await getCol(roomCode).doc(rec.tag).set(rec); }
  async function removeRecord(tag) { await getCol(roomCode).doc(tag).delete(); }
  async function updateRecord(tag, fields) { await getCol(roomCode).doc(tag).update(fields); }

  function handleSearch() {
    const q = query.trim().toUpperCase(); if (!q) return;
    const found = records.find(r => r.tag.toUpperCase()===q);
    if (found) { setCurrentRecord(found); setStatus(STATUS.found); }
    else { setCurrentRecord(null); setStatus(STATUS.notfound); }
  }

  function startAdd() {
    setForm({fecha:new Date().toISOString().split("T")[0],responsable:"",estado_calidad:false,estado_precomisionado:false,link:"",notas:""});
    setFormError(""); setStatus(STATUS.adding);
  }

  async function handleFormSubmit() {
    if (!form.responsable.trim()) { setFormError("El responsable es obligatorio."); return; }
    if (!form.fecha) { setFormError("La fecha es obligatoria."); return; }
    const newTag = query.trim().toUpperCase();
    if (records.find(r=>r.tag.toUpperCase()===newTag)) { setFormError("Este TAG ya existe."); return; }
    const rec = {tag:newTag,...form};
    await saveRecord(rec); setCurrentRecord(rec); setStatus(STATUS.success);
  }

  function resetSearch() { setQuery(""); setStatus(STATUS.idle); setCurrentRecord(null); setPrecomMode(false); }

  async function handlePrecomSubmit() {
    if (!precomForm.responsable.trim()) return;
    await updateRecord(currentRecord.tag, {
      ...(precomMode==="calidad"?{estado_calidad:true}:{estado_precomisionado:true}),
      fecha: precomForm.fecha||currentRecord.fecha,
      responsable: precomForm.responsable,
      notas: precomForm.notas?(currentRecord.notas?currentRecord.notas+" | "+precomForm.notas:precomForm.notas):currentRecord.notas
    });
    setPrecomMode(false);
  }

  function handleImageSelect(e) {
    const file = e.target.files[0]; if (!file) return;
    setImagePreview(URL.createObjectURL(file));
    const reader = new FileReader();
    reader.onload = ev => setImageData(ev.target.result.split(",")[1]);
    reader.readAsDataURL(file); e.target.value="";
  }

  async function handleChatSend() {
    const msg = chatInput.trim();
    if ((!msg && !imageData) || chatLoading) return;
    const hasImage = !!imageData;
    const userMsg = {role:"user",text:msg||"📷 Imagen adjunta — extraé los TAGs",image:imagePreview};
    const updatedMsgs = [...chatMessages, userMsg];
    setChatMessages(updatedMsgs); setChatInput(""); setChatLoading(true);

    const dbCtx = records.map(r=>`TAG:${r.tag}|Cal:${r.estado_calidad?"✓":"✗"}|Precom:${r.estado_precomisionado?"✓":"✗"}|Resp:${r.responsable||"N/A"}|${r.estado_calidad&&r.estado_precomisionado?"COMPLETADO":"PENDIENTE"}`).join("\n");
    const sys = hasImage
      ? `Extrae TAGs de la imagen. Responde SOLO JSON: {"tags":["TAG-A123"]}. Sin TAGs: {"tags":[]}`
      : `Asistente técnico de TAGs.\n${dbCtx}\nTotal:${records.length} Completados:${records.filter(r=>r.estado_calidad&&r.estado_precomisionado).length} Pendientes:${records.filter(r=>!r.estado_calidad||!r.estado_precomisionado).length}\nResponde en español, conciso.`;

    const apiMsgs = hasImage
      ? [{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:imageData}},{type:"text",text:msg||"Extraé los TAGs de esta imagen."}]}]
      : updatedMsgs.filter((m,i)=>!(m.role==="assistant"&&i===0)).map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:apiMsgs})});
      const data = await res.json();
      const raw = data.content?.[0]?.text||"";
      if (hasImage) {
        try {
          const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
          const tags = parsed.tags||[];
          setImageData(null); setImagePreview(null);
          if (!tags.length) setChatMessages(prev=>[...prev,{role:"assistant",text:"No encontré TAGs en la imagen."}]);
          else { setChatMessages(prev=>[...prev,{role:"assistant",text:`Encontré ${tags.length} TAG(s): ${tags.join(", ")}.\n\nVoy a preguntarte el estado de cada uno.`}]); setWizardTags(tags); }
        } catch { setChatMessages(prev=>[...prev,{role:"assistant",text:"No pude interpretar la imagen."}]); }
      } else setChatMessages(prev=>[...prev,{role:"assistant",text:raw}]);
    } catch { setChatMessages(prev=>[...prev,{role:"assistant",text:"Error de conexión con la IA."}]); }
    setChatLoading(false);
  }

  async function handleWizardFinish(answers) {
    const today = new Date().toISOString().split("T")[0];
    const newRecords = [];
    for (const a of answers) {
      if (!records.find(r=>r.tag===a.tag)) {
        const rec={tag:a.tag,estado_calidad:a.calidad,estado_precomisionado:a.precom,fecha:a.fecha||today,responsable:a.responsable||"",link:"",notas:""};
        await saveRecord(rec); newRecords.push(rec);
      }
    }
    setWizardTags(null);
    const summary = answers.map(a=>`• ${a.tag}: Cal ${a.calidad?"✓":"✗"} | Precom ${a.precom?"✓":"✗"}`).join("\n");
    const pendingPrecom = newRecords.filter(r=>r.estado_calidad&&!r.estado_precomisionado);
    setChatMessages(prev=>[...prev,{role:"assistant",text:`✅ ${newRecords.length} registro(s) agregados:\n\n${summary}`,pendingPrecom}]);
  }

  const completados = records.filter(r=>r.estado_calidad&&r.estado_precomisionado).length;
  const pendientes = records.length - completados;

  if (!roomCode) return <LoginScreen onEnter={setRoomCode}/>;

  return (
    <div style={{minHeight:"100vh",background:"#0a0e14",color:"#e2e8f0",fontFamily:"'Courier New',monospace",display:"flex",flexDirection:"column"}}>

      {confirmDelete && (
        <div style={{position:"fixed",inset:0,background:"#000000aa",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div className="card fade-in" style={{maxWidth:380,width:"90%",borderColor:"#ff444466",textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:12}}>⚠</div>
            <p style={{fontSize:16,fontWeight:700,color:"#ff4444",marginBottom:8}}>¿ELIMINAR REGISTRO?</p>
            <p style={{fontSize:13,color:"#a0aec0",marginBottom:6}}>Estás por eliminar permanentemente:</p>
            <p style={{fontSize:20,color:"#00ff9d",letterSpacing:3,marginBottom:20}}>{confirmDelete}</p>
            <p style={{fontSize:12,color:"#4a5568",marginBottom:24}}>Esta acción no se puede deshacer.</p>
            <div style={{display:"flex",gap:12}}>
              <button onClick={async()=>{await removeRecord(confirmDelete);setConfirmDelete(null);if(currentRecord?.tag===confirmDelete)resetSearch();}} className="btn btn-danger" style={{flex:1,background:"#ff444422",border:"1px solid #ff4444"}}>SÍ, ELIMINAR</button>
              <button onClick={()=>setConfirmDelete(null)} className="btn btn-primary" style={{flex:1}}>CANCELAR</button>
            </div>
          </div>
        </div>
      )}

      <div style={{borderBottom:"1px solid #1e3a2a",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"#0d1318"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div className="pulse" style={{width:8,height:8,borderRadius:"50%",background:"#00ff9d",boxShadow:"0 0 10px #00ff9d"}}/>
          <span style={{fontSize:18,fontWeight:700,color:"#00ff9d",letterSpacing:3}}>TAG TRACKER</span>
          <span style={{fontSize:11,color:"#4a6a5a",letterSpacing:2}}>v3.0</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{background:"#00ff9d11",border:"1px solid #00ff9d33",borderRadius:4,padding:"4px 12px",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:10,color:"#4a7a6a",letterSpacing:1}}>SALA</span>
            <span style={{fontSize:13,color:"#00ff9d",letterSpacing:2}}>{roomCode}</span>
          </div>
          {loading && <span className="pulse" style={{fontSize:11,color:"#4a7a6a"}}>● SYNC</span>}
          <button onClick={()=>{setRoomCode(null);setRecords([]);resetSearch();}} style={{background:"none",border:"1px solid #1e3a2a",color:"#4a5568",borderRadius:4,padding:"4px 10px",cursor:"pointer",fontSize:11,fontFamily:"'Courier New',monospace"}}>SALIR</button>
          <div style={{display:"flex",gap:8}}>
            {[["consulta","CONSULTA"],["registro","REGISTROS"],["chat","IA CHAT"]].map(([key,label])=>(
              <button key={key} onClick={()=>setTab(key)} className="btn" style={{background:tab===key?"#00ff9d":"transparent",color:tab===key?"#0a0e14":"#4a7a6a",border:"1px solid "+(tab===key?"#00ff9d":"#1e3a2a"),fontSize:11,padding:"8px 16px"}}>{label}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{background:"#0d1520",borderBottom:"1px solid #1e2d3d",padding:"10px 24px",display:"flex",gap:32,alignItems:"center"}}>
        {[["TOTAL TAGs",records.length,"#7dd3fc"],["COMPLETADOS",completados,"#00ff9d"],["PENDIENTES",pendientes,"#fbbf24"]].map(([label,val,color])=>(
          <div key={label} style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:20,fontWeight:700,color}}>{val}</span>
            <span style={{fontSize:11,color:"#4a5568",letterSpacing:1}}>{label}</span>
          </div>
        ))}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:100,height:4,background:"#1e2d3d",borderRadius:2,overflow:"hidden"}}>
            <div style={{width:`${records.length?(completados/records.length)*100:0}%`,height:"100%",background:"#00ff9d",borderRadius:2,transition:"width 0.5s"}}/>
          </div>
          <span style={{fontSize:11,color:"#4a7a6a"}}>{records.length?Math.round((completados/records.length)*100):0}% COMPLETADO</span>
        </div>
      </div>

      <div style={{maxWidth:1000,margin:"0 auto",padding:"28px 24px",flex:1,width:"100%"}}>

        {tab==="consulta" && <div className="fade-in">
          <div style={{marginBottom:28,maxWidth:540}}>
            <h2 style={{fontSize:24,fontWeight:700,color:"#e2e8f0",marginBottom:6,letterSpacing:2}}>CONSULTA DE TAG</h2>
            <p style={{fontSize:12,color:"#4a6a5a"}}>// ingresa el identificador único para verificar su estado</p>
          </div>
          <div style={{display:"flex",gap:10,maxWidth:540,marginBottom:28}}>
            <input value={query} onChange={e=>{setQuery(e.target.value.toUpperCase());setStatus(STATUS.idle);}} placeholder="TAG-XXXX" style={{fontSize:16,letterSpacing:2}} onKeyDown={e=>e.key==="Enter"&&handleSearch()}/>
            <button onClick={handleSearch} className="btn btn-primary" style={{whiteSpace:"nowrap"}}>VERIFICAR</button>
            {status!==STATUS.idle && <button onClick={resetSearch} className="btn btn-danger">RESET</button>}
          </div>

          {status===STATUS.found && currentRecord && (
            <div className="card fade-in scan-line" style={{maxWidth:540,borderColor:currentRecord.estado_calidad&&currentRecord.estado_precomisionado?"#00ff9d44":"#fbbf2444"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
                <span style={{fontSize:20,color:"#00ff9d",letterSpacing:3}}>{currentRecord.tag}</span>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span className="tag-badge" style={{background:currentRecord.estado_calidad&&currentRecord.estado_precomisionado?"#00ff9d22":"#fbbf2422",color:currentRecord.estado_calidad&&currentRecord.estado_precomisionado?"#00ff9d":"#fbbf24",border:`1px solid ${currentRecord.estado_calidad&&currentRecord.estado_precomisionado?"#00ff9d":"#fbbf24"}`}}>
                    {currentRecord.estado_calidad&&currentRecord.estado_precomisionado?"✓ HECHO":"⏳ PENDIENTE"}
                  </span>
                  <button onClick={()=>setConfirmDelete(currentRecord.tag)} style={{background:"none",border:"1px solid #ff444433",color:"#ff4444",borderRadius:4,cursor:"pointer",fontSize:11,padding:"3px 8px",fontFamily:"'Courier New',monospace"}}>✕</button>
                </div>
              </div>
              <div style={{display:"grid",gap:12}}>
                {[["Planilla Calidad",currentRecord.estado_calidad,"estado_calidad"],["Planilla Precomisionado",currentRecord.estado_precomisionado,"estado_precomisionado"]].map(([label,val,field])=>(
                  <div key={label} style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span style={{fontSize:12,color:"#7dd3fc"}}>{label}</span>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span className="check-box" style={{background:val?"#00ff9d22":"#ff444422",color:val?"#00ff9d":"#ff4444",border:`1px solid ${val?"#00ff9d":"#ff4444"}`}}>{val?"✓":"✗"}</span>
                      {val && <button onClick={()=>updateRecord(currentRecord.tag,{[field]:false})} style={{background:"none",border:"1px solid #ff444444",color:"#ff4444",borderRadius:4,cursor:"pointer",fontSize:11,padding:"2px 8px",fontFamily:"'Courier New',monospace"}} onMouseOver={e=>e.currentTarget.style.background="#ff444422"} onMouseOut={e=>e.currentTarget.style.background="none"}>✕ quitar</button>}
                    </div>
                  </div>
                ))}
                {[["Fecha de Firma",currentRecord.fecha],["Responsable",currentRecord.responsable],["Notas",currentRecord.notas]].map(([label,val])=>val&&(
                  <div key={label} style={{display:"flex",justifyContent:"space-between",gap:16}}>
                    <span style={{fontSize:12,color:"#7dd3fc"}}>{label}</span>
                    <span style={{fontSize:12,color:"#a0aec0",textAlign:"right"}}>{val}</span>
                  </div>
                ))}
                {currentRecord.link && <a href={currentRecord.link} target="_blank" rel="noreferrer" style={{fontSize:11,color:"#00ff9d",textDecoration:"none"}}>→ VER DOCUMENTO</a>}
                {(!currentRecord.estado_calidad||!currentRecord.estado_precomisionado)&&!precomMode&&(
                  <div style={{marginTop:8,borderTop:"1px solid #1e3a2a",paddingTop:16}}>
                    <p style={{fontSize:11,color:"#fbbf24",marginBottom:10,letterSpacing:1}}>⚠ PLANILLAS PENDIENTES</p>
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {!currentRecord.estado_calidad&&<button onClick={()=>{setPrecomForm({fecha:new Date().toISOString().split("T")[0],responsable:currentRecord.responsable||"",notas:""});setPrecomMode("calidad");}} className="btn btn-primary" style={{width:"100%",background:"#fbbf24",color:"#0a0e14"}}>+ COMPLETAR PLANILLA DE CALIDAD</button>}
                      {!currentRecord.estado_precomisionado&&<button onClick={()=>{setPrecomForm({fecha:new Date().toISOString().split("T")[0],responsable:currentRecord.responsable||"",notas:""});setPrecomMode("precom");}} className="btn btn-primary" style={{width:"100%",background:"#7dd3fc",color:"#0a0e14"}}>+ COMPLETAR PLANILLA DE PRECOMISIONADO</button>}
                    </div>
                  </div>
                )}
                {precomMode&&(
                  <div className="fade-in" style={{marginTop:8,borderTop:"1px solid #1e3a2a",paddingTop:16,display:"grid",gap:12}}>
                    <p style={{fontSize:11,color:precomMode==="calidad"?"#fbbf24":"#7dd3fc",letterSpacing:1}}>DATOS DE {precomMode==="calidad"?"CALIDAD":"PRECOMISIONADO"}</p>
                    <div><label style={{fontSize:11,color:"#4a7a6a",display:"block",marginBottom:5}}>FECHA *</label><input type="date" value={precomForm.fecha} onChange={e=>setPrecomForm({...precomForm,fecha:e.target.value})}/></div>
                    <div><label style={{fontSize:11,color:"#4a7a6a",display:"block",marginBottom:5}}>RESPONSABLE *</label><input value={precomForm.responsable} onChange={e=>setPrecomForm({...precomForm,responsable:e.target.value})} placeholder="Ing. Apellido"/></div>
                    <div><label style={{fontSize:11,color:"#4a7a6a",display:"block",marginBottom:5}}>NOTAS</label><textarea value={precomForm.notas} onChange={e=>setPrecomForm({...precomForm,notas:e.target.value})} placeholder="Observaciones..." style={{resize:"vertical",minHeight:50}}/></div>
                    <div style={{display:"flex",gap:10}}>
                      <button onClick={handlePrecomSubmit} className="btn btn-primary" style={{flex:1}} disabled={!precomForm.responsable.trim()}>GUARDAR</button>
                      <button onClick={()=>setPrecomMode(false)} className="btn btn-secondary">CANCELAR</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {status===STATUS.notfound&&(
            <div className="card fade-in" style={{maxWidth:540,borderColor:"#ff444433"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
                <span style={{fontSize:24}}>⚠</span>
                <div>
                  <p style={{fontSize:15,fontWeight:700,color:"#ff4444"}}>TAG NO ENCONTRADO</p>
                  <p style={{fontSize:12,color:"#4a5568"}}>"{query}" no existe en la base de datos</p>
                </div>
              </div>
              <p style={{fontSize:14,color:"#a0aec0",marginBottom:16}}>¿Deseas agregar este registro?</p>
              <div style={{display:"flex",gap:12}}>
                <button onClick={startAdd} className="btn btn-primary">SÍ, AGREGAR</button>
                <button onClick={resetSearch} className="btn btn-secondary">NO, CANCELAR</button>
              </div>
            </div>
          )}

          {status===STATUS.adding&&(
            <div className="card fade-in" style={{maxWidth:540,borderColor:"#7dd3fc33"}}>
              <h3 style={{fontSize:16,fontWeight:700,color:"#7dd3fc",marginBottom:20,letterSpacing:2}}>NUEVO REGISTRO: {query}</h3>
              <div style={{display:"grid",gap:16}}>
                <div><label style={{fontSize:11,color:"#4a7a6a",display:"block",marginBottom:6}}>FECHA *</label><input type="date" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})}/></div>
                <div><label style={{fontSize:11,color:"#4a7a6a",display:"block",marginBottom:6}}>RESPONSABLE *</label><input value={form.responsable} onChange={e=>setForm({...form,responsable:e.target.value})} placeholder="Ing. Apellido"/></div>
                <div><label style={{fontSize:11,color:"#4a7a6a",display:"block",marginBottom:6}}>LINK</label><input value={form.link} onChange={e=>setForm({...form,link:e.target.value})} placeholder="https://..."/></div>
                <div><label style={{fontSize:11,color:"#4a7a6a",display:"block",marginBottom:6}}>NOTAS</label><textarea value={form.notas} onChange={e=>setForm({...form,notas:e.target.value})} placeholder="Observaciones..." style={{resize:"vertical",minHeight:60}}/></div>
                <div style={{borderTop:"1px solid #1e2d3d",paddingTop:16}}>
                  <p style={{fontSize:11,color:"#4a7a6a",marginBottom:12}}>ESTADO DE PLANILLAS</p>
                  {[["estado_calidad","Planilla de Calidad"],["estado_precomisionado","Planilla de Precomisionado"]].map(([key,label])=>(
                    <label key={key} className="checkbox-row"><input type="checkbox" checked={form[key]} onChange={e=>setForm({...form,[key]:e.target.checked})}/><span style={{fontSize:14,color:"#a0aec0"}}>{label}</span></label>
                  ))}
                </div>
                {formError&&<p style={{fontSize:12,color:"#ff4444",padding:"8px 12px",background:"#ff444411",borderRadius:4}}>{formError}</p>}
                <div style={{display:"flex",gap:12}}>
                  <button onClick={handleFormSubmit} className="btn btn-primary" style={{flex:1}}>GUARDAR REGISTRO</button>
                  <button onClick={()=>setStatus(STATUS.notfound)} className="btn btn-secondary">CANCELAR</button>
                </div>
              </div>
            </div>
          )}

          {status===STATUS.success&&currentRecord&&(
            <div className="card fade-in scan-line" style={{maxWidth:540,borderColor:"#00ff9d44"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
                <span style={{fontSize:28,color:"#00ff9d"}}>✓</span>
                <div>
                  <p style={{fontSize:16,fontWeight:700,color:"#00ff9d"}}>REGISTRO GUARDADO</p>
                  <p style={{fontSize:12,color:"#4a6a5a"}}>{currentRecord.tag} agregado correctamente</p>
                </div>
              </div>
              <button onClick={resetSearch} className="btn btn-primary">NUEVA CONSULTA</button>
            </div>
          )}
        </div>}

        {tab==="registro"&&<div className="fade-in">
          <div style={{marginBottom:20}}>
            <h2 style={{fontSize:24,fontWeight:700,color:"#e2e8f0",letterSpacing:2}}>BASE DE DATOS</h2>
            <p style={{fontSize:12,color:"#4a6a5a"}}>// {records.length} registros — sala: {roomCode}</p>
          </div>
          <div className="card" style={{padding:0,overflow:"hidden"}}>
            <div style={{overflowX:"auto"}}>
              <table>
                <thead><tr>{["TAG","Calidad","Precomisionado","Estado","Fecha","Responsable","Doc",""].map(h=><th key={h}>{h}</th>)}</tr></thead>
                <tbody>
                  {records.map((r,i)=>(
                    <tr key={i}>
                      <td><span style={{color:"#7dd3fc",letterSpacing:1}}>{r.tag}</span></td>
                      <td><span className="check-box" style={{background:r.estado_calidad?"#00ff9d22":"#ff444422",color:r.estado_calidad?"#00ff9d":"#ff4444",border:`1px solid ${r.estado_calidad?"#00ff9d":"#ff4444"}`}}>{r.estado_calidad?"✓":"✗"}</span></td>
                      <td><span className="check-box" style={{background:r.estado_precomisionado?"#00ff9d22":"#ff444422",color:r.estado_precomisionado?"#00ff9d":"#ff4444",border:`1px solid ${r.estado_precomisionado?"#00ff9d":"#ff4444"}`}}>{r.estado_precomisionado?"✓":"✗"}</span></td>
                      <td><span className="tag-badge" style={{background:r.estado_calidad&&r.estado_precomisionado?"#00ff9d22":"#fbbf2422",color:r.estado_calidad&&r.estado_precomisionado?"#00ff9d":"#fbbf24",fontSize:11}}>{r.estado_calidad&&r.estado_precomisionado?"HECHO":"PENDIENTE"}</span></td>
                      <td style={{fontSize:12,color:"#718096"}}>{r.fecha||"—"}</td>
                      <td style={{fontSize:12,color:"#a0aec0"}}>{r.responsable||"—"}</td>
                      <td>{r.link?<a href={r.link} target="_blank" rel="noreferrer" style={{color:"#00ff9d",fontSize:11}}>→ VER</a>:<span style={{color:"#2d3748"}}>—</span>}</td>
                      <td><button onClick={()=>setConfirmDelete(r.tag)} style={{background:"none",border:"1px solid #ff444433",color:"#ff4444",borderRadius:4,cursor:"pointer",fontSize:11,padding:"3px 10px",fontFamily:"'Courier New',monospace"}} onMouseOver={e=>e.currentTarget.style.background="#ff444422"} onMouseOut={e=>e.currentTarget.style.background="none"}>✕</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>}

        {tab==="chat"&&<div className="fade-in" style={{display:"flex",flexDirection:"column",height:"calc(100vh - 220px)"}}>
          <div style={{marginBottom:16}}>
            <h2 style={{fontSize:24,fontWeight:700,color:"#e2e8f0",letterSpacing:2}}>IA ASISTENTE</h2>
            <p style={{fontSize:12,color:"#4a6a5a"}}>// consultas en lenguaje natural · importación desde imagen 📷</p>
          </div>
          <div className="card" style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
            <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:14,padding:"8px 0",marginBottom:14}}>
              {chatMessages.map((m,i)=>(
                <div key={i} style={{display:"flex",flexDirection:"column",alignItems:m.role==="user"?"flex-end":"flex-start"}}>
                  {m.image&&<img src={m.image} alt="adjunto" style={{maxWidth:180,borderRadius:6,marginBottom:6,border:"1px solid #1e3a2a"}}/>}
                  <div className="chat-bubble" style={{background:m.role==="user"?"#00ff9d22":"#1a2535",border:`1px solid ${m.role==="user"?"#00ff9d44":"#1e2d3d"}`,color:m.role==="user"?"#00ff9d":"#a0aec0"}}>{m.text}</div>
                  {m.pendingPrecom&&m.pendingPrecom.length>0&&(
                    <div className="fade-in" style={{marginTop:10,background:"#0d1520",border:"1px solid #fbbf2433",borderRadius:8,padding:16,maxWidth:"85%"}}>
                      <p style={{fontSize:11,color:"#fbbf24",marginBottom:10,letterSpacing:1}}>⚠ PRECOMISIONADO PENDIENTE EN:</p>
                      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                        {m.pendingPrecom.map(r=><button key={r.tag} onClick={()=>{setChatPrecomTag(r.tag);setChatPrecomForm({fecha:new Date().toISOString().split("T")[0],responsable:r.responsable||""});}} className="btn" style={{background:"#7dd3fc22",color:"#7dd3fc",border:"1px solid #7dd3fc44",fontSize:12,padding:"6px 14px"}}>+ {r.tag}</button>)}
                      </div>
                      {chatPrecomTag&&m.pendingPrecom.find(r=>r.tag===chatPrecomTag)&&(
                        <div className="fade-in" style={{marginTop:14,borderTop:"1px solid #1e2d3d",paddingTop:14,display:"grid",gap:10}}>
                          <p style={{fontSize:12,color:"#7dd3fc",letterSpacing:1}}>COMPLETAR: {chatPrecomTag}</p>
                          <div><label style={{fontSize:11,color:"#4a7a6a",display:"block",marginBottom:4}}>FECHA</label><input type="date" value={chatPrecomForm.fecha} onChange={e=>setChatPrecomForm(f=>({...f,fecha:e.target.value}))}/></div>
                          <div><label style={{fontSize:11,color:"#4a7a6a",display:"block",marginBottom:4}}>RESPONSABLE *</label><input value={chatPrecomForm.responsable} onChange={e=>setChatPrecomForm(f=>({...f,responsable:e.target.value}))} placeholder="Ing. Apellido"/></div>
                          <div style={{display:"flex",gap:8}}>
                            <button disabled={!chatPrecomForm.responsable.trim()} onClick={async()=>{await updateRecord(chatPrecomTag,{estado_precomisionado:true,fecha:chatPrecomForm.fecha,responsable:chatPrecomForm.responsable});setChatMessages(prev=>prev.map((msg,mi)=>mi===i?{...msg,pendingPrecom:msg.pendingPrecom.filter(r=>r.tag!==chatPrecomTag)}:msg));setChatPrecomTag(null);setChatMessages(prev=>[...prev,{role:"assistant",text:`✅ Precomisionado de ${chatPrecomTag} completado.`}]);}} className="btn btn-primary" style={{flex:1}}>GUARDAR</button>
                            <button onClick={()=>setChatPrecomTag(null)} className="btn btn-secondary">CANCELAR</button>
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              ))}
              {chatLoading&&<div style={{display:"flex"}}><div className="chat-bubble" style={{background:"#1a2535",border:"1px solid #1e2d3d",color:"#00ff9d"}}><span className="pulse" style={{fontSize:12}}>procesando...</span></div></div>}
              {wizardTags&&!chatLoading&&<ImportWizard tags={wizardTags} db={records} onFinish={handleWizardFinish} onCancel={()=>{setWizardTags(null);setChatMessages(prev=>[...prev,{role:"assistant",text:"Importación cancelada."}]);}}/>}
              <div ref={chatEndRef}/>
            </div>
            {imagePreview&&<div style={{marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
              <img src={imagePreview} alt="preview" style={{height:56,borderRadius:6,border:"1px solid #00ff9d44"}}/>
              <span style={{fontSize:11,color:"#4a7a6a"}}>Imagen lista</span>
              <button onClick={()=>{setImageData(null);setImagePreview(null);}} style={{background:"none",border:"none",color:"#ff4444",cursor:"pointer",fontSize:16}}>✕</button>
            </div>}
            <div style={{display:"flex",gap:10}}>
              <input type="file" accept="image/*" ref={fileRef} onChange={handleImageSelect} style={{display:"none"}}/>
              <button onClick={()=>fileRef.current.click()} className="img-btn" title="Adjuntar imagen">📷</button>
              <input value={chatInput} onChange={e=>setChatInput(e.target.value)} placeholder={imageData?"Instrucciones opcionales...":"¿Cómo está el TAG-A123?..."} disabled={chatLoading} onKeyDown={e=>e.key==="Enter"&&handleChatSend()}/>
              <button onClick={handleChatSend} className="btn btn-primary" disabled={chatLoading||(!chatInput.trim()&&!imageData)} style={{whiteSpace:"nowrap"}}>ENVIAR</button>
            </div>
          </div>
        </div>}
      </div>

      <div style={{borderTop:"1px solid #1e3a2a",padding:"16px 24px",textAlign:"center",background:"#0d1318"}}>
        <span style={{fontSize:12,color:"#4a6a5a",letterSpacing:2}}>DESARROLLADO POR <span style={{color:"#00ff9d"}}>FRANCISCO ROLDÁN</span></span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
